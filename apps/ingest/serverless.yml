service: spotify-stats
frameworkVersion: '3'

provider:
  name: aws
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  runtime: nodejs22.x
  memorySize: 512
  stackTags:
    owner: 'bshelor'
    service: ${self:service}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - '*'
        - Effect: Allow
          Action:
            - s3:ListBucket
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !GetAtt DataBucket.Arn
            - !Join ['', [!GetAtt DataBucket.Arn, '/*']]

  environment:
    BUCKET: !Ref DataBucket
    NODE_OPTIONS: '--enable-source-maps'

functions:
  rankArtists:
    handler: src/handler.handler
    timeout: 600
    events:
      - schedule:
          rate: cron(0 13 ? * MON *)
          enabled: true
          description: 'Weekly Spotify artist ranking run (Mondays 13:00 UTC)'

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    format: cjs
    mainFields:
      - main
      - module
    external:
      - '@aws-sdk/*'

resources:
  Resources:
    DataBucket:
      Type: 'AWS::S3::Bucket'
      Properties:
        BucketName: artist-data-test-2

plugins:
  - serverless-esbuild
  - serverless-plugin-resource-tagging
